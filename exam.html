<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam In Progress</title>
<link rel="stylesheet" href="exam.css">
</head>
<body>

  <!-- Fixed timer, always visible top-right -->
  <div id="timer-box">
    <span id="timer-label">Time Left</span>
    <span id="timer-display">30:00</span>
  </div>

  <header id="exam-header">
    <div class="header-left">
      <h1 id="subject-title">Loading exam...</h1>
      <div id="candidate-info"></div>
    </div>
    <button id="submit-btn" class="btn btn-submit">Submit Test</button>
  </header>

  <div id="exam-body">

    <!-- Main question panel -->
    <main id="question-panel">
      <div id="question-meta">
        <span id="question-number">Question 1 of 20</span>
        <span id="question-type-badge"></span>
      </div>

      <div id="question-text"></div>

      <form id="options-form"></form>

      <div class="action-row">
        <button id="save-btn" class="btn btn-save">Save</button>
        <button id="mark-btn" class="btn btn-mark">Mark for Review</button>
        <button id="save-mark-btn" class="btn btn-save-mark">Save &amp; Mark for Review</button>
      </div>

      <div class="nav-row">
        <button id="prev-btn" class="btn btn-nav">&larr; Previous</button>
        <button id="next-btn" class="btn btn-nav">Next &rarr;</button>
      </div>
    </main>

    <!-- Question palette sidebar -->
    <aside id="palette-panel">
      <h3>Question Palette</h3>

      <div class="legend">
        <div><span class="dot dot-notVisited"></span> Not Visited</div>
        <div><span class="dot dot-visited"></span> Visited, Not Answered</div>
        <div><span class="dot dot-answered"></span> Answered</div>
        <div><span class="dot dot-markedForReview"></span> Marked for Review</div>
        <div><span class="dot dot-answeredMarked"></span> Answered &amp; Marked</div>
      </div>

      <div id="palette-grid"></div>

      <button id="submit-btn-sidebar" class="btn btn-submit full-width">Submit Test</button>
    </aside>

  </div>

  <!-- Confirmation modal for submit -->
  <div id="submit-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Submit Test?</h2>
      <p id="submit-summary"></p>
      <div class="modal-actions">
        <button id="confirm-submit-btn" class="btn btn-submit">Yes, Submit</button>
        <button id="cancel-submit-btn" class="btn btn-nav">Cancel</button>
      </div>
    </div>
  </div>

  <script src="exam.js"></script>
</body>
</html>
